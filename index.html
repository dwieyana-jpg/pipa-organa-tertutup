<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pipa Organa Tertutup Interaktif</title>
<style>
body{
    background:#0f172a;
    color:white;
    text-align:center;
    font-family:Arial;
    margin:0;
}

.controls{
    position:absolute;
    top:15px;
    right:15px;
}
.controls button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

canvas{
    background:#020617;
    margin-top:20px;
}

.footer{
    margin-top:15px;
    font-size:14px;
    color:#94a3b8;
}
</style>
</head>
<body>

<div class="controls">
    <button onclick="toggleSound()">🔊 ON / OFF</button>
</div>

<h2>🎶 Pipa Organa Tertutup</h2>

Panjang:
<input type="range" id="L" min="0.2" max="1.2" step="0.01" value="0.6">
<span id="Lval">0.60</span>

<br><br>

Harmonik:
<select id="n">
<option value="1">Harmonik 1</option>
<option value="2">Harmonik 2</option>
<option value="3">Harmonik 3</option>
<option value="4">Harmonik 4</option>
</select>

<h3 id="freq"></h3>

<canvas id="c" width="800" height="260"></canvas>

<div class="footer">
    Dibuat oleh: <b>Dwi Yono, S.Pd</b> — Guru Fisika SMAN 1 Karanganyar
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let t = 0;
const v = 340;

// AUDIO
let audioCtx = null;
let oscillator = null;
let gainNode = null;
let isPlaying = false;

// 🔥 tetap pakai ganjil di belakang layar
function getRealN(){
    let n = parseInt(document.getElementById("n").value);
    return 2*n - 1;
}

function startSound(freq){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    oscillator = audioCtx.createOscillator();
    gainNode = audioCtx.createGain();

    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.05);

    oscillator.start();
}

function stopSound(){
    if(oscillator && gainNode && audioCtx){
        let now = audioCtx.currentTime;

        gainNode.gain.setValueAtTime(gainNode.gain.value, now);
        gainNode.gain.linearRampToValueAtTime(0, now + 0.05);

        oscillator.stop(now + 0.05);
        oscillator = null;
    }
}

function toggleSound(){
    isPlaying = !isPlaying;

    let L = parseFloat(document.getElementById("L").value);
    let nReal = getRealN();
    let f = nReal * v / (4 * L);

    if(isPlaying){
        startSound(f);
    } else {
        stopSound();
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    let L = parseFloat(document.getElementById("L").value);
    let nReal = getRealN();

    let f = nReal * v / (4 * L);

    document.getElementById("freq").innerText =
        "f = " + f.toFixed(2) + " Hz";
    document.getElementById("Lval").innerText = L.toFixed(2);

    if(isPlaying && oscillator){
        oscillator.frequency.setValueAtTime(f, audioCtx.currentTime);
    }

    let maxVisual = canvas.width * 0.85;
    let minL = 0.2;
    let maxL = 1.2;

    let pipeLength = ((L - minL)/(maxL-minL))*maxVisual + 100;
    let offsetX = (canvas.width - pipeLength)/2;

    let scale = pipeLength / L;

    // pipa (kiri tertutup)
    ctx.strokeStyle="#38bdf8";
    ctx.beginPath();
    ctx.moveTo(offsetX,50);
    ctx.lineTo(offsetX+pipeLength,50);
    ctx.moveTo(offsetX,210);
    ctx.lineTo(offsetX+pipeLength,210);
    ctx.moveTo(offsetX,50);
    ctx.lineTo(offsetX,210);
    ctx.stroke();

    // envelope
    ctx.beginPath();
    for(let x=0;x<=L;x+=0.001){
        let y = Math.abs(Math.sin(nReal*Math.PI*x/(2*L)));
        let X = offsetX + x*scale;
        ctx.lineTo(X,130 - y*70);
    }
    for(let x=L;x>=0;x-=0.001){
        let y = Math.abs(Math.sin(nReal*Math.PI*x/(2*L)));
        let X = offsetX + x*scale;
        ctx.lineTo(X,130 + y*70);
    }
    ctx.strokeStyle="rgba(255,255,255,0.3)";
    ctx.stroke();

    // gelombang
    ctx.beginPath();
    for(let x=0;x<=L;x+=0.001){
        let y = Math.sin(nReal*Math.PI*x/(2*L))*Math.cos(2*Math.PI*f*t);
        let X = offsetX + x*scale;
        let Y = 130 - y*70;

        if(x===0) ctx.moveTo(X,Y);
        else ctx.lineTo(X,Y);
    }
    ctx.strokeStyle="#22c55e";
    ctx.stroke();

    // animasi udara (kanan saja)
    let air = Math.cos(2*Math.PI*f*t)*10;
    ctx.beginPath();
    ctx.arc(offsetX + pipeLength + 15 - air,130,5,0,2*Math.PI);
    ctx.fillStyle="cyan";
    ctx.fill();

    // label utama
    ctx.fillStyle="red";
    ctx.fillText("S", offsetX-10,130);

    ctx.fillStyle="yellow";
    ctx.fillText("P", offsetX + pipeLength + 5,130);

    // watermark
    ctx.fillStyle="rgba(255,255,255,0.2)";
    ctx.fillText("Dwi Yono, S.Pd", 10, 250);

    t += 0.01;
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
